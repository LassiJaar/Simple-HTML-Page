<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        canvas { border:1px solid #d3d3d3; background-color: #f1f1f1; }
        body { font-family: sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <input type="text" id="pokId" placeholder="Enter ID or Name (e.g. 6)"><br><br>
    
    <p id='pkName'>Pokemon Name: -</p>
    <p id='type1'>Type 1: -</p>
    <p id='type2'>Type 2: -</p>

    <button onclick="getPokemon(document.getElementById('pokId').value)">FETCH POKÉMON!</button>

    <script>
    function getPokemon(n) {
        if(!n) return;

        fetch('https://pokeapi.co/api/v2/pokemon/' + n.toLowerCase())
        .then(res => {
            if (!res.ok) throw new Error('Pokemon not found');
            return res.json();
        })
        .then((data) => {
            document.getElementById('pkName').innerHTML = 'Name: ' + data.name.toUpperCase();
            document.getElementById('type1').innerHTML = 'Type 1: ' + data.types[0].type.name;
            
            if(data.types[1]) {
                document.getElementById('type2').innerHTML = 'Type 2: ' + data.types[1].type.name;
            } else {
                document.getElementById('type2').innerHTML = 'Type 2: none';
            }
        })
        .catch(err => alert(err.message));
    }
    </script>
</body>
</html>
