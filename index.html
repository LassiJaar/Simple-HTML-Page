<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f1f1f1; }
        .card { border:1px solid #d3d3d3; background: white; padding: 20px; border-radius: 8px; max-width: 350px; text-align: center; margin: auto; }
        img { width: 150px; height: 150px; image-rendering: pixelated; }
        
        .stat-container { text-align: left; margin-top: 10px; }
        .stat-label { font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .bar-bg { background-color: #eee; border-radius: 10px; width: 100%; height: 12px; overflow: hidden; }
        .bar-fill { background-color: #ff4747; height: 100%; width: 0%; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

<div class="card">
    <input type="text" id="pokId" placeholder="ID or Name">
    <button onclick="getPokemon(document.getElementById('pokId').value)">FETCH!</button>
    
    <h3 id="pkName">Pokemon Name</h3>
    
    <div>
        <img id="pokeImg" src="" style="display:none;">
    </div>

    <label for="spriteSelect">View Style:</label>
    <select id="spriteSelect" onchange="updateImage()">
        <option value="front_default">Default Front</option>
        <option value="back_default">Default Back</option>
        <option value="front_shiny">Shiny Front</option>
        <option value="back_shiny">Shiny Back</option>
        <option value="official-artwork">Official Artwork</option>
        <option value="showdown">Animated (Showdown)</option>
    </select>

    <p id="type1">Type 1: -</p>
    <p id="type2">Type 2: -</p>

    <div id="statsSection" class="stat-container"></div>
</div>

<script>
let currentSprites = {};

function getPokemon(n) {
    if(!n) return;

    fetch('https://pokeapi.co/api/v2/pokemon/' + n.toLowerCase())
    .then(res => {
        if (!res.ok) throw new Error('Pokemon not found');
        return res.json();
    })
    .then((data) => {
        currentSprites = data.sprites;
        
        document.getElementById('pkName').innerHTML = 'Name: ' + data.name.toUpperCase();
        document.getElementById('type1').innerHTML = 'Type 1: ' + data.types[0].type.name;
        
        if(data.types[1]) {
            document.getElementById('type2').innerHTML = 'Type 2: ' + data.types[1].type.name;
        } else {
            document.getElementById('type2').innerHTML = '';
        }

        const statsSection = document.getElementById('statsSection');
        statsSection.innerHTML = '';

        data.stats.forEach(s => {
            const percentage = (s.base_stat / 255) * 100;
            statsSection.innerHTML += `
                <div class="stat-label">${s.stat.name}: ${s.base_stat}</div>
                <div class="bar-bg">
                    <div class="bar-fill" style="width: ${percentage}%"></div>
                </div>
            `;
        });

        updateImage();
    })
    .catch(err => alert(err.message));
}

function updateImage() {
    const imgElement = document.getElementById('pokeImg');
    const selection = document.getElementById('spriteSelect').value;
    let url = "";

    if (!currentSprites.other) return;

    if (selection === "official-artwork") {
        url = currentSprites.other['official-artwork'].front_default;
    } else if (selection === "showdown") {
        url = currentSprites.other['showdown'].front_default;
    } else {
        url = currentSprites[selection];
    }

    if(url) {
        imgElement.src = url;
        imgElement.style.display = "inline-block";
    }
}
</script>

</body>
</html>
