<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<div class="pokedex">
    <div style="margin-bottom: 20px;">
        <input type="text" id="pokId" placeholder="ID OR NAME">
        <button onclick="getPokemon(document.getElementById('pokId').value)">GO!</button>
    </div>

    <div class="screen">
        <h3 id="pkName">NO DATA</h3>
        <div><img id="pokeImg" src="" style="display:none;"></div>
        <p id="type1"></p>
        <p id="type2"></p>
        <div id="descriptionBox" class="description-text"></div>
        <div id="statsSection" class="stat-container"></div>
    </div>

    <label style="font-size: 12px;">DISPLAY MODE:</label><br>
    <select id="spriteSelect" onchange="updateImage()">
        <option selected value="official-artwork">OFFICIAL ART</option>
        <option value="front_default">FRONT SPRITE</option>
        <option value="back_default">BACK SPRITE</option>
        <option value="front_shiny">SHINY FRONT</option>
        <option value="back_shiny">SHINY BACK</option>
        <option value="showdown">ANIMATED (GIF)</option>
    </select>
</div>

<script>
let currentSprites = {};

function getPokemon(n) {
    if(!n) return;

    fetch('https://pokeapi.co/api/v2/pokemon/' + n.toLowerCase())
    .then(res => {
        if (!res.ok) throw new Error('Pokemon not found :(');
        return res.json();
    })
    .then((data) => {
        currentSprites = data.sprites;
        
        document.getElementById('pkName').innerHTML = 'NAME: ' + data.name.toUpperCase();
        
        document.getElementById('type1').innerHTML = '';
        document.getElementById('type2').innerHTML = '';
        
        data.types.forEach((t, index) => {
            const typeId = t.type.url.split('/').filter(Boolean).pop();
            const iconUrl = `https://githubusercontent.com{typeId}.png`;
            const img = `<img src="${iconUrl}" class="type-icon" style="height:25px; margin:5px;">`;
            document.getElementById('type' + (index + 1)).innerHTML = img;
        });

        const statsSection = document.getElementById('statsSection');
        statsSection.innerHTML = '';

        data.stats.forEach(s => {
            const percentage = Math.min((s.base_stat / 200) * 100, 100); 
            const statClassName = s.stat.name; 
            const displayName = s.stat.name.replace('special-', 'S.');

            statsSection.innerHTML += `
                <div class="stat-row">
                    <div class="stat-name">${displayName.toUpperCase()}</div>
                    <div class="bar-bg">
                        <div class="bar-fill ${statClassName}" style="width: ${percentage}%"></div>
                    </div>
                    <div style="width: 35px; font-size: 12px; margin-left: 8px; font-weight: bold;">${s.base_stat}</div>
                </div>`;
        });

        updateImage();
        return fetch(data.species.url); 
    })
    .then(res => res.json())
    .then((speciesData) => {
        const descriptionEntry = speciesData.flavor_text_entries.find(
            entry => entry.language.name === 'en'
        );

        if (descriptionEntry) {
            let cleanDescription = descriptionEntry.flavor_text.replace(/[\f\n\r]/gm, ' '); 
            document.getElementById('descriptionBox').innerText = cleanDescription;
        }
    })
    .catch(err => {
        console.error(err);
        alert(err.message);
        document.getElementById('descriptionBox').innerText = "DATA NOT FOUND.";
    }); 
}

function updateImage() {
    const imgElement = document.getElementById('pokeImg');
    const selection = document.getElementById('spriteSelect').value;
    let url = "";

    if (!currentSprites.other) return;

    if (selection === "official-artwork") {
        url = currentSprites.other['official-artwork'].front_default;
    } else if (selection === "showdown") {
        url = currentSprites.other['showdown'].front_default;
    } else {
        url = currentSprites[selection];
    }

    if(url) {
        imgElement.src = url;
        imgElement.style.display = "inline-block";
    }
}
</script>

</body>
</html>
